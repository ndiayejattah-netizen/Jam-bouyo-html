<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connexion — JAM'BOUYO Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>

:root{
  --white:#FFFFFF;--off:#F7F8FC;--blue:#0D1B3E;--blue2:#1A3A8F;--orange:#E8652A;
  --text:#5A6275;--border:#D4DDEF;--light:#EEF2F9;--shadow:0 12px 40px rgba(13,27,62,.10);
  --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--off);color:var(--blue)}
a{text-decoration:none;color:inherit}
.jb-shell{min-height:100vh;display:grid;grid-template-columns:280px 1fr}
.jb-sidebar{background:var(--blue);color:#fff;padding:28px 22px;position:sticky;top:0;height:100vh}
.jb-brand{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.jb-brand img{width:42px;height:42px;object-fit:contain;background:white;border-radius:12px}
.jb-brand strong{display:block;font-size:16px;letter-spacing:.08em}
.jb-brand small{font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.55);text-transform:uppercase}
.jb-menu{display:grid;gap:8px}
.jb-menu button,.jb-menu a{border:0;background:transparent;color:rgba(255,255,255,.72);text-align:left;padding:13px 14px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer}
.jb-menu button.active,.jb-menu button:hover,.jb-menu a:hover{background:rgba(255,255,255,.10);color:#fff}
.jb-main{padding:32px;min-width:0}
.jb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;gap:18px}
.jb-top h1{font-family:"Plus Jakarta Sans",Inter,sans-serif;font-size:clamp(26px,4vw,40px);letter-spacing:-.03em}
.jb-sub{color:var(--text);margin-top:6px;line-height:1.6}
.jb-user{background:white;border:1px solid var(--border);border-radius:999px;padding:8px 14px;color:var(--text);font-weight:700;font-size:13px;box-shadow:0 4px 14px rgba(13,27,62,.06)}
.jb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:26px}
.jb-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:0 4px 18px rgba(13,27,62,.06)}
.jb-card h3{font-size:17px;margin-bottom:8px}
.jb-card p{color:var(--text);font-size:14px;line-height:1.6}
.jb-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--light);margin-bottom:14px}
.jb-section{display:none}.jb-section.active{display:block}
.jb-panel{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);margin-bottom:20px}
.jb-panel h2{font-size:22px;margin-bottom:14px}
.jb-list{display:grid;gap:12px}
.jb-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border:1px solid var(--border);border-radius:14px;background:#fff}
.jb-row span{color:var(--text);font-size:14px}
.jb-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:10px;padding:11px 16px;font-weight:800;cursor:pointer;font-size:14px}
.jb-btn-primary{background:var(--orange);color:#fff}
.jb-btn-blue{background:var(--blue2);color:#fff}
.jb-btn-light{background:var(--light);color:var(--blue)}
.jb-form{display:grid;gap:14px;max-width:620px}
.jb-two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:12px;font-weight:800;color:var(--blue);display:grid;gap:7px}
input,select,textarea{border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font:inherit;background:#F8F9FC;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue2);background:white;box-shadow:0 0 0 3px rgba(26,58,143,.08)}
.jb-empty{padding:24px;border:1px dashed var(--border);border-radius:16px;color:var(--text);background:#FBFCFF}
.jb-video{aspect-ratio:16/9;background:linear-gradient(135deg,#0D1B3E,#1A3A8F);border-radius:18px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;margin-top:12px}
.jb-mobile-top{display:none}
@media(max-width:900px){
  .jb-shell{grid-template-columns:1fr}
  .jb-sidebar{position:relative;height:auto}
  .jb-grid{grid-template-columns:1fr}
  .jb-two{grid-template-columns:1fr}
  .jb-main{padding:20px}
}

body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#EEF2F9,#fff,#FFF0E8)}
.login-card{width:100%;max-width:430px;background:white;border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);padding:34px}
.login-brand{text-align:center;margin-bottom:24px}.login-brand img{width:62px;margin:0 auto 10px}.login-brand h1{font-size:24px;font-family:"Plus Jakarta Sans",sans-serif}.login-brand p{color:var(--text);margin-top:6px}
.login-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}.login-error{display:none;color:#b42318;background:#fff1f0;border:1px solid #ffd6d2;border-radius:12px;padding:10px;margin-top:12px;font-size:13px}
</style></head>
<body>
<div class="login-card">
  <div class="login-brand">
    <img src="logo-jb.png" alt="JAM'BOUYO">
    <h1>Connexion</h1>
    <p>Accédez à votre espace selon votre rôle.</p>
  </div>
  <form class="jb-form" id="loginForm">
    <label>Email<input name="email" type="email" placeholder="email@exemple.com" required></label>
    <label>Mot de passe<input name="password" type="password" placeholder="Votre mot de passe" required></label>
    <button class="jb-btn jb-btn-primary" type="submit">Se connecter</button>
    <p class="login-error" id="loginError"></p>
  </form>
  <div class="login-actions"><a class="jb-btn jb-btn-light" href="index.html">← Retour accueil</a></div>
</div>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
async function getConfig(){
  const r = await fetch('/api/config');
  if(!r.ok) throw new Error("Configuration Supabase manquante");
  return r.json();
}
const cfg = await getConfig();
const supabase = createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const errorBox = document.getElementById('loginError');
  errorBox.style.display='none';
  const email=e.target.email.value.trim();
  const password=e.target.password.value;
  const { data, error } = await supabase.auth.signInWithPassword({email,password});
  if(error){ errorBox.textContent="Identifiants incorrects."; errorBox.style.display='block'; return; }
  const { data: profile, error: pError } = await supabase.from('profiles').select('*').eq('id', data.user.id).single();
  if(pError || !profile){ errorBox.textContent="Profil introuvable. Contactez l’administrateur."; errorBox.style.display='block'; return; }
  if(profile.role === 'admin') location.href='admin.html';
  else if(profile.role === 'teacher') location.href='teacher.html';
  else location.href='student.html';
});
</script>
</body></html>
